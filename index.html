<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <script type="module" src="index.js"></script>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 15px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin: auto;
            max-width: 800px;
        }

        .main-layout {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            resize: none;
            outline: none;
        }

        /* 화면에 보이는 가짜 입력창 (클릭 시 숨겨진 창으로 포커스 토스) */
        #displayInput {
            background-color: #f0f0f0;
            cursor: pointer;
            color: #666;
            border-style: dashed;
        }

        #displayInput:focus {
            border-color: #4A154B;
            background-color: #f5f0f6;
        }

        /* 실제 붙여넣기를 받을 숨겨진 텍스트 영역 */
        #hiddenInput {
            position: absolute;
            left: -9999px;
            top: 0;
        }

        /* 출력창 (편집 가능) */
        #output {
            background-color: #ffffff;
            border: 2px solid #4A154B;
        }

        .label-convert {
            padding: 10px 20px;
            font-weight: bold;
            align-self: center;
        }

        .btn-copy {
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            background: #eee;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .status-msg {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
        .toast {
            visibility: hidden; /* 평소에는 숨김 */
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%); /* 가운데 정렬 */
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
        }
        .label-please-report {
            text-align: right;
            margin-right: 64px;
            margin-bottom: 12px;
            color: #888;
        }
    </style>
</head>

<body>
    <a href="https://github.com/Lifeclue/Slack-emoji-to-unicode" class="github-corner" aria-label="View source on GitHub"><svg width="80" height="80" viewBox="0 0 250 250" style="fill:#151513; color:#fff; position: absolute; top: 0; border: 0; right: 0;" aria-hidden="true"><path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"/><path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin: 130px 106px;" class="octo-arm"/><path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body"/></svg></a><style>.github-corner:hover .octo-arm{animation:octocat-wave 560ms ease-in-out}@keyframes octocat-wave{0%,100%{transform:rotate(0)}20%,60%{transform:rotate(-25deg)}40%,80%{transform:rotate(10deg)}}@media (max-width:500px){.github-corner:hover .octo-arm{animation:none}.github-corner .octo-arm{animation:octocat-wave 560ms ease-in-out}}</style>
    <div class="label-please-report">변환되지 않는 이모지를 발견하면 Github에 제보해주세요 ➔</div>
    <div class="container">
        <div class="main-layout">
            <div class="column">
                <div class="label">입력 (여기를 클릭 후 붙여넣기)</div>
                <textarea id="displayInput" readonly placeholder="여기를 클릭하고 '붙여넣기' 하세요. 직접 타이핑은 차단됩니다."></textarea>
                <textarea id="hiddenInput"></textarea>
            </div>

            <div style="display: flex; align-self: center;">
                <div class="label-convert">➔</div>
            </div>

            <div class="column">
                <div class="label">
                    결과 (편집 가능)
                    <button id="copyBtn" class="btn-copy" onclick="handleCopy()">결과 복사</button>
                    <div id="toast" class="toast">복사되었습니다!</div>
                </div>
                <textarea id="output" placeholder="변환된 결과가 여기에 표시됩니다."></textarea>
            </div>
        </div>
    </div>
</body>

</html>
